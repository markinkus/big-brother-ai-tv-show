services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neural_house}
      POSTGRES_USER: ${POSTGRES_USER:-neural_house}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neural_house}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./neural-house/apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://neural_house:neural_house@postgres:5432/neural_house}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      VIP_DEBUG_BYPASS: ${VIP_DEBUG_BYPASS:-true}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./neural-house/apps/worker
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_BASE_URL: http://api:${API_PORT:-8000}
    depends_on:
      - redis
      - api

  web:
    build:
      context: ./neural-house
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
